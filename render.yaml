services:
  - type: web
    name: instagram-watcher
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
    disk:
      name: watcher-data
      mountPath: /var/data
      sizeGB: 1
