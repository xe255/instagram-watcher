services:
  - type: web
    name: instagram-watcher
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/status
    envVars:
      - key: NODE_ENV
        value: production
      - key: FREE_TIER
        value: "true"
      - key: USE_EXTERNAL_CRON
        value: "true"
      - key: MAX_SNAPSHOTS
        value: "5"
      - key: MAX_LOGS
        value: "50"
      - key: CRON_SECRET
        generateValue: true
