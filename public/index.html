<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#05070d" />
  <title>Instagram Watcher</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "ui-sans-serif", "system-ui", "Segoe UI", "Arial", "sans-serif"]
          },
          colors: {
            ink: "#05070d",
            panel: "#0d111c",
            line: "rgba(255,255,255,.1)"
          },
          boxShadow: {
            glow: "0 18px 70px rgba(236, 72, 153, .22)",
            soft: "0 20px 60px rgba(2, 6, 23, .12)"
          }
        }
      }
    };
  </script>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap");

    :root { color-scheme: dark; }
    .light { color-scheme: light; }
    html, body {
      max-width: 100vw;
      overflow-x: hidden;
    }
    * { scrollbar-width: thin; scrollbar-color: rgba(236,72,153,.55) transparent; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(168, 85, 247, .28), transparent 34rem),
        radial-gradient(circle at 90% 8%, rgba(236, 72, 153, .22), transparent 30rem),
        #05070d;
    }
    .light body, body.light {
      background:
        radial-gradient(circle at top left, rgba(168, 85, 247, .14), transparent 34rem),
        radial-gradient(circle at 90% 8%, rgba(236, 72, 153, .13), transparent 30rem),
        #f8fafc;
    }
    .ig-ring {
      background: conic-gradient(from 210deg, #f97316, #ec4899, #8b5cf6, #06b6d4, #f97316);
    }
    .surface {
      background: rgba(13, 17, 28, .78);
      border: 1px solid rgba(255,255,255,.1);
      backdrop-filter: blur(18px);
    }
    .light .surface {
      background: rgba(255,255,255,.82);
      border-color: rgba(15,23,42,.1);
    }
    .premium-row {
      transition: transform .2s ease, background .2s ease, border-color .2s ease;
    }
    .premium-row:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,.06);
      border-color: rgba(236,72,153,.36);
    }
    .light .premium-row:hover { background: rgba(15,23,42,.04); }
    .light .text-white,
    .light [class*="light:text-slate-950"] {
      color: #0f172a !important;
    }
    .light .text-slate-100,
    .light .text-slate-200,
    .light .text-slate-300 {
      color: #475569 !important;
    }
    .light .text-slate-400 {
      color: #64748b !important;
    }
    .light .text-pink-300 {
      color: #db2777 !important;
    }
    .light .text-violet-300 {
      color: #7c3aed !important;
    }
    .light .text-emerald-300 {
      color: #059669 !important;
    }
    .light .text-rose-300 {
      color: #e11d48 !important;
    }
    .light .text-sky-300 {
      color: #0284c7 !important;
    }
    .light .bg-ink {
      background-color: #ffffff !important;
    }
    .light .bg-white\/5,
    .light .bg-white\/\[\.03\],
    .light [class*="light:bg-slate-50"],
    .light [class*="light:bg-slate-100"] {
      background-color: rgba(15, 23, 42, .045) !important;
    }
    .light .border-white\/10,
    .light [class*="light:border-slate-200"] {
      border-color: rgba(15, 23, 42, .12) !important;
    }
    .light .bg-black\/20 {
      background-color: rgba(15, 23, 42, .08) !important;
    }
    .tab-active {
      background: linear-gradient(135deg, rgba(168,85,247,.9), rgba(236,72,153,.9));
      color: white;
      box-shadow: 0 12px 32px rgba(236,72,153,.22);
    }
    .drag-active {
      border-color: rgba(236,72,153,.85) !important;
      background: rgba(236,72,153,.08) !important;
    }
    .spin { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Mobile-first layout */
    .mobile-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 50;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    @media (min-width: 1024px) {
      .mobile-nav { display: none; }
      .main-content { padding-bottom: 0 !important; }
    }
    .main-content {
      padding-bottom: calc(5.5rem + env(safe-area-inset-bottom, 0));
    }
    .nav-item-active {
      color: #f472b6;
      background: rgba(236, 72, 153, .12);
    }
    .touch-target { min-height: 44px; min-width: 44px; }
    .log-info { color: #94a3b8; }
    .log-success { color: #34d399; }
    .log-warn { color: #fbbf24; }
    .log-error { color: #fb7185; }
  </style>
</head>
<body class="text-slate-100 antialiased">
  <div id="app" class="min-h-screen"></div>

  <script>
    const STORAGE_KEY = "instagram-watcher:snapshots";
    const SETTINGS_KEY = "instagram-watcher:settings";
    const DB_NAME = "instagram-watcher-db";
    const DB_VERSION = 1;

    const demoFollowers = ["maya.design", "roni.studio", "david.ai", "noa.moves", "eden.photo", "lior.codes", "tal.travel", "yuval.fm", "bar.style", "shira.art", "amit.design", "neta.fit"];
    const demoFollowing = ["maya.design", "roni.studio", "david.ai", "noa.moves", "eden.photo", "brand.lab", "visual.archive", "music.daily", "studio.eden", "coffee.telaviv", "amit.design", "creator.tools", "neta.fit"];

    const SYNC_INTERVALS = {
      "5m": 5 * 60 * 1000,
      "10m": 10 * 60 * 1000,
      "15m": 15 * 60 * 1000,
      "30m": 30 * 60 * 1000,
      "1h": 60 * 60 * 1000,
      "6h": 6 * 60 * 60 * 1000,
      "24h": 24 * 60 * 60 * 1000
    };

    const RATE_LIMIT = {
      minGapMs: SYNC_INTERVALS["5m"],
      jitterMaxMs: 5 * 1000,
      backoffMinutes: [5, 15, 30, 60, 120]
    };

    let syncTimer = null;
    let cooldownTicker = null;

    const state = {
      tab: "all",
      view: "dashboard",
      query: "",
      theme: localStorage.getItem("instagram-watcher:theme") || "dark",
      uploadStatus: "idle",
      copied: "",
      storageReady: false,
      storageStatus: "Local fallback ready",
      serverMode: false,
      serverStatus: "Checking server...",
      freeTier: false,
      logs: [],
      selectedSnapshot: null,
      syncInProgress: false,
      watcher: loadSettings(),
      snapshots: loadSnapshots()
    };

    const API = {
      async get(path) {
        const res = await fetch(path);
        if (!res.ok) throw new Error(await res.text());
        return res.json();
      },
      async send(method, path, body) {
        const res = await fetch(path, {
          method,
          headers: { "Content-Type": "application/json" },
          body: body ? JSON.stringify(body) : undefined
        });
        if (!res.ok) throw new Error((await res.json().catch(() => ({}))).error || res.statusText);
        return res.json();
      }
    };

    function defaultSettings() {
      return {
        adminUsername: "",
        adminSessionId: "",
        targetUsername: "",
        targetUserId: "",
        username: "", // kept for backwards-compatibility checks
        connected: false,
        running: false,
        interval: "30m",
        lastSync: null,
        health: "Ready",
        rateLimitUntil: null,
        consecutiveErrors: 0,
        lastError: ""
      };
    }

    function normalizeSettings(settings = {}) {
      const defaults = defaultSettings();
      const merged = { ...defaults, ...settings };
      if (merged.username && !merged.targetUsername) {
        merged.targetUsername = merged.username;
      }
      if (!SYNC_INTERVALS[merged.interval]) merged.interval = "30m";
      merged.consecutiveErrors = Number(merged.consecutiveErrors) || 0;
      merged.rateLimitUntil = merged.rateLimitUntil || null;
      merged.running = Boolean(merged.running);
      return merged;
    }

    function loadSettings() {
      try {
        return normalizeSettings(JSON.parse(localStorage.getItem(SETTINGS_KEY)));
      } catch {
        return defaultSettings();
      }
    }

    function loadSnapshots() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
        return saved.length ? saved : [makeSnapshot("Demo snapshot", demoFollowers, demoFollowing, new Date(Date.now() - 86400000 * 2))];
      } catch {
        return [makeSnapshot("Demo snapshot", demoFollowers, demoFollowing, new Date(Date.now() - 86400000 * 2))];
      }
    }

    async function openDatabase() {
      if (!("indexedDB" in window)) throw new Error("IndexedDB is not available");
      return new Promise((resolve, reject) => {
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onupgradeneeded = () => {
          const db = request.result;
          if (!db.objectStoreNames.contains("app")) db.createObjectStore("app");
        };
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function readDatabaseValue(key) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction("app", "readonly");
        const request = tx.objectStore("app").get(key);
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
        tx.oncomplete = () => db.close();
      });
    }

    async function writeDatabaseValue(key, value) {
      const db = await openDatabase();
      return new Promise((resolve, reject) => {
        const tx = db.transaction("app", "readwrite");
        tx.objectStore("app").put(value, key);
        tx.oncomplete = () => {
          db.close();
          resolve();
        };
        tx.onerror = () => reject(tx.error);
      });
    }

    async function initStorage() {
      try {
        await initServerMode();
        if (state.serverMode) {
          await refreshFromServer();
          state.storageReady = true;
        } else {
          const [snapshots, settings] = await Promise.all([
            readDatabaseValue("snapshots"),
            readDatabaseValue("settings")
          ]);
          if (Array.isArray(snapshots) && snapshots.length) state.snapshots = snapshots;
          if (settings) state.watcher = normalizeSettings(settings);
          await persistAll();
          state.storageReady = true;
          state.storageStatus = "IndexedDB active";
          refreshWatcherHealth();
          startWatcherScheduler();
        }
      } catch (error) {
        console.warn(error);
        state.storageReady = false;
        state.storageStatus = "Local fallback active";
      }
      startCooldownTicker();
      render();
    }

    async function initServerMode() {
      try {
        const status = await API.get("/api/status");
        state.serverMode = true;
        state.serverStatus = status.watcher.running ? "Running 24/7 on server" : "Server ready (paused)";
        state.watcher = normalizeSettings(status.watcher);
        state.syncInProgress = Boolean(status.watcher.syncInProgress);
        state.freeTier = Boolean(status.freeTier);
        state.storageType = status.storageType;
        startServerPolling();
      } catch {
        state.serverMode = false;
        state.serverStatus = "Offline — using browser storage";
      }
    }

    async function refreshFromServer() {
      const [snapshots, logs, status] = await Promise.all([
        API.get("/api/snapshots"),
        API.get("/api/logs?limit=50"),
        API.get("/api/status")
      ]);
      state.snapshots = snapshots.length ? snapshots : state.snapshots;
      state.logs = logs;
      state.watcher = normalizeSettings(status.watcher);
      state.syncInProgress = Boolean(status.watcher.syncInProgress);
      state.serverStatus = status.watcher.running ? "Running 24/7 on server" : "Server ready (paused)";
      state.freeTier = Boolean(status.freeTier);
      state.storageType = status.storageType;
      if (state.storageType === "gist") {
        state.storageStatus = "GitHub Gist active (persistent)";
      } else {
        state.storageStatus = "Server storage active (ephemeral)";
      }
    }

    let serverPollTimer = null;
    function serverPollIntervalMs() {
      return state.freeTier ? 60_000 : 10_000;
    }

    function startServerPolling() {
      if (serverPollTimer) clearInterval(serverPollTimer);
      if (!state.serverMode) return;
      const tick = async () => {
        try {
          const oldSnapshotsCount = state.snapshots.length;
          const oldHealth = state.watcher.health;
          const oldRunning = state.watcher.running;
          const oldSync = state.syncInProgress;
          
          await refreshFromServer();
          refreshWatcherHealth();
          
          const stateChanged = state.snapshots.length !== oldSnapshotsCount ||
                               state.watcher.health !== oldHealth ||
                               state.watcher.running !== oldRunning ||
                               state.syncInProgress !== oldSync;
          
          if (stateChanged) {
            render();
          } else if (state.view === "logs" || state.tab === "logs") {
            updateLogsOnly();
          } else {
            updateCooldownBadges();
          }
        } catch (error) {
          console.warn("Server poll failed", error);
        }
      };
      tick();
      serverPollTimer = setInterval(tick, serverPollIntervalMs());
    }

    function updateLogsOnly() {
      const container = document.getElementById("logsContainer");
      if (container) container.innerHTML = logsListInner();
    }

    async function persistAll() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.snapshots));
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.watcher));
      await Promise.all([
        writeDatabaseValue("snapshots", state.snapshots),
        writeDatabaseValue("settings", state.watcher)
      ]);
    }

    function saveSnapshots() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.snapshots));
      writeDatabaseValue("snapshots", state.snapshots).catch(error => {
        console.warn(error);
        state.storageStatus = "Local fallback active";
      });
    }

    function saveSettings() {
      localStorage.setItem(SETTINGS_KEY, JSON.stringify(state.watcher));
      writeDatabaseValue("settings", state.watcher).catch(error => {
        console.warn(error);
        state.storageStatus = "Local fallback active";
      });
    }

    function makeSnapshot(label, followers, following, date = new Date()) {
      const cleanFollowers = uniqueUsernames(followers);
      const cleanFollowing = uniqueUsernames(following);
      return {
        id: window.crypto && crypto.randomUUID ? crypto.randomUUID() : String(Date.now()),
        label,
        date: date.toISOString(),
        followers: cleanFollowers,
        following: cleanFollowing
      };
    }

    function uniqueUsernames(values) {
      return [...new Set(values.map(normalizeUsername).filter(Boolean))].sort((a, b) => a.localeCompare(b));
    }

    function normalizeUsername(value) {
      return String(value || "")
        .trim()
        .replace(/^@/, "")
        .replace(/^https?:\/\/(www\.)?instagram\.com\//i, "")
        .split(/[/?#]/)[0]
        .toLowerCase()
        .replace(/[^a-z0-9._]/g, "");
    }

    function latestSnapshot() {
      return [...state.snapshots].sort((a, b) => new Date(b.date) - new Date(a.date))[0];
    }

    function previousSnapshot() {
      const sorted = [...state.snapshots].sort((a, b) => new Date(b.date) - new Date(a.date));
      return sorted[1] || null;
    }

    function diffData(snapshot = latestSnapshot()) {
      const followers = new Set(snapshot.followers);
      const following = new Set(snapshot.following);
      const unfollowers = snapshot.following.filter(user => !followers.has(user));
      const fans = snapshot.followers.filter(user => !following.has(user));
      const mutuals = snapshot.followers.filter(user => following.has(user));
      return { followers: snapshot.followers, following: snapshot.following, unfollowers, fans, mutuals };
    }

    function watchedName() {
      const username = normalizeUsername(state.watcher.username);
      return username ? `@${username}` : "She";
    }

    function watchedLabel() {
      const username = normalizeUsername(state.watcher.username);
      return username ? `@${username}` : "her";
    }

    const CHANGE_TYPES = {
      followed_her: { icon: "user-plus", tone: "emerald", rowClass: "bg-emerald-400/10 text-emerald-300" },
      unfollowed_her: { icon: "user-minus", tone: "rose", rowClass: "bg-rose-400/10 text-rose-300" },
      she_followed: { icon: "user-round-plus", tone: "sky", rowClass: "bg-sky-400/10 text-sky-300" },
      she_unfollowed: { icon: "user-round-minus", tone: "amber", rowClass: "bg-amber-400/10 text-amber-300" }
    };

    function changeDescription(change) {
      const subject = watchedName();
      const her = watchedLabel();
      if (change.category === "followed_her") return `@${change.user} followed ${her}`;
      if (change.category === "unfollowed_her") return `@${change.user} unfollowed ${her}`;
      if (change.category === "she_followed") return `${subject} followed @${change.user}`;
      return `${subject} unfollowed @${change.user}`;
    }

    function changeShortLabel(change) {
      const labels = {
        followed_her: "Followed her",
        unfollowed_her: "Unfollowed her",
        she_followed: "She followed",
        she_unfollowed: "She unfollowed"
      };
      return labels[change.category];
    }

    function recentChanges() {
      if (state.snapshots.length < 2) return [];
      const sorted = [...state.snapshots].sort((a, b) => new Date(a.date) - new Date(b.date));
      const changes = [];
      for (let i = 1; i < sorted.length; i++) {
        const prev = sorted[i - 1];
        const current = sorted[i];
        const currentFollowers = new Set(current.followers);
        const previousFollowers = new Set(prev.followers);
        const currentFollowing = new Set(current.following);
        const previousFollowing = new Set(prev.following);
        
        changes.push(
          ...prev.followers.filter(user => !currentFollowers.has(user)).map(user => ({ category: "unfollowed_her", user, date: current.date })),
          ...current.followers.filter(user => !previousFollowers.has(user)).map(user => ({ category: "followed_her", user, date: current.date })),
          ...prev.following.filter(user => !currentFollowing.has(user)).map(user => ({ category: "she_unfollowed", user, date: current.date })),
          ...current.following.filter(user => !previousFollowing.has(user)).map(user => ({ category: "she_followed", user, date: current.date }))
        );
      }
      return changes.sort((a, b) => new Date(b.date) - new Date(a.date));
    }

    function icon(name, cls = "w-5 h-5") {
      return `<i data-lucide="${name}" class="${cls}"></i>`;
    }

    function render() {
      document.documentElement.classList.toggle("light", state.theme === "light");
      document.body.classList.toggle("light", state.theme === "light");
      const snapshot = latestSnapshot();
      const data = diffData(snapshot);
      const changes = recentChanges();
      const tabs = [
        ["all", "All", changes.length, "activity"],
        ["followed_her", "Followed her", changes.filter(c => c.category === "followed_her").length, "user-plus"],
        ["unfollowed_her", "Unfollowed her", changes.filter(c => c.category === "unfollowed_her").length, "user-minus"],
        ["she_followed", "She followed", changes.filter(c => c.category === "she_followed").length, "user-round-plus"],
        ["she_unfollowed", "She unfollowed", changes.filter(c => c.category === "she_unfollowed").length, "user-round-minus"]
      ];

      document.getElementById("app").innerHTML = `
        <div class="mx-auto flex min-h-screen w-full max-w-[1500px] flex-col lg:flex-row">
          ${sidebar()}
          <main class="main-content flex-1 px-3 py-3 sm:px-6 lg:px-8 lg:py-4">
            ${topbar(snapshot)}
            ${state.view === "dashboard" ? stats(data) : ""}
            <section class="mt-4 grid gap-4 ${state.view === "dashboard" ? "xl:grid-cols-[minmax(0,1fr)_390px]" : ""} lg:mt-5 lg:gap-5">
              <div class="space-y-4 lg:space-y-5">
                ${state.view === "dashboard" ? `${watcherPanel()}${uploadPanel()}` : ""}
                ${state.view === "watcher" ? watcherPanel() : ""}
                ${state.view === "import" ? `${uploadPanel()}${instructionsPanel()}` : ""}
                ${state.view === "lists" ? audiencePanel(data, changes, tabs) : ""}
                ${state.view === "audience" ? audienceListsPanel(data) : ""}
                ${state.view === "logs" ? logsPanel() : ""}
                ${state.view === "settings" ? `${storagePanel()}${instructionsPanel()}` : ""}
              </div>
              ${state.view === "dashboard" ? `
              <aside class="hidden space-y-5 xl:block">
                ${storagePanel()}
                ${instructionsPanel()}
              </aside>` : ""}
            </section>
          </main>
          ${mobileNav()}
        </div>
      `;

      lucide.createIcons();
      bindEvents();
    }

    function sidebar() {
      return `
        <aside class="sticky top-0 z-20 flex items-center justify-between border-b border-white/10 bg-ink/80 px-4 py-3 backdrop-blur-xl light:bg-white/85 lg:h-screen lg:w-72 lg:flex-col lg:items-stretch lg:border-b-0 lg:border-r lg:px-5 lg:py-6">
          <div class="flex w-full items-center justify-between lg:block">
            <div class="flex items-center gap-3">
              <div class="ig-ring grid h-12 w-12 place-items-center rounded-2xl p-[2px] shadow-glow">
                <div class="grid h-full w-full place-items-center rounded-[14px] bg-ink text-white">${icon("instagram", "h-6 w-6")}</div>
              </div>
              <div>
                <h1 class="text-lg font-extrabold tracking-tight text-white light:text-slate-950">Watcher</h1>
                <p class="text-xs text-slate-400">Private follower intelligence</p>
              </div>
            </div>
            
            <!-- Mobile Toggle Actions -->
            <div class="flex items-center gap-2 lg:hidden">
              <button id="themeToggleMobile" class="grid h-10 w-10 place-items-center rounded-xl border border-white/10 bg-white/5 text-slate-200 transition hover:border-pink-400 hover:text-white light:border-slate-200 light:bg-slate-50 light:text-slate-700">
                ${icon(state.theme === "dark" ? "sun" : "moon", "h-4 w-4.5")}
              </button>
              <button id="menuToggle" class="grid h-10 w-10 place-items-center rounded-xl border border-white/10 bg-white/5 text-slate-200 transition hover:border-pink-400 hover:text-white light:border-slate-200 light:bg-slate-50 light:text-slate-700">
                ${icon(state.mobileMenuOpen ? "x" : "menu", "h-5 w-5")}
              </button>
            </div>
          </div>
          
          <nav class="mt-8 hidden space-y-2 lg:block">
            ${[
              ["dashboard", "Dashboard", "layout-dashboard"],
              ["watcher", "Watcher Sync", "radar"],
              ["audience", "Audience Lists", "users"],
              ["lists", "Live Feed", "activity"],
              ["logs", "Server Logs", "scroll-text"],
              ["import", "Import", "upload-cloud"],
              ["settings", "Storage", "database"]
            ].map(([id, label, navIcon]) => `
              <button type="button" data-view="${id}" class="view-btn flex w-full items-center gap-3 rounded-2xl px-4 py-3 text-sm font-semibold transition ${state.view === id ? "bg-white/10 text-white light:bg-slate-100 light:text-slate-950" : "text-slate-400 hover:bg-white/5 hover:text-white light:hover:bg-slate-100 light:hover:text-slate-950"}">
                ${icon(navIcon, "h-4 w-4")} ${label}
              </button>
            `).join("")}
          </nav>
          
          <!-- Mobile Dropdown Menu -->
          ${state.mobileMenuOpen ? `
            <div class="absolute left-0 right-0 top-full z-30 border-b border-white/10 bg-ink/95 px-4 py-4 shadow-2xl backdrop-blur-2xl light:bg-white/95 lg:hidden">
              <nav class="space-y-1.5">
                ${[
                  ["dashboard", "Dashboard", "layout-dashboard"],

        return user.toLowerCase().includes(state.query.toLowerCase());
      });

      return activeList(filtered);
    }

      const tabTones = {

      const emptyMessages = {

    function handleIntervalChange(event) {
      if (event.target.id !== "syncInterval") return;
      state.watcher.interval = event.target.value;
      if (state.serverMode) {
        saveWatcherToServer().catch(console.error);
      } else {
        saveSettings();
        refreshWatcherHealth();
        scheduleNextSync();
      }
      updateCooldownBadges();
    }

    function setView(view) {
      state.view = view;
      state.mobileMenuOpen = false;
      if (view === "lists" && !["all", "followed_her", "unfollowed_her", "she_followed", "she_unfollowed"].includes(state.tab)) {
        state.tab = "all";
      }
      if (view === "audience" && !["followers", "unfollowers", "fans", "mutuals", "following"].includes(state.tab)) {

    function bindPersistentEvents() {
      const app = document.getElementById("app");
      if (!app || app.dataset.persistentEvents === "true") return;
      app.dataset.persistentEvents = "true";
      app.addEventListener("change", handleIntervalChange);
      app.addEventListener("click", event => {
        const viewBtn = event.target.closest(".view-btn");
        if (viewBtn?.dataset.view) {
          setView(viewBtn.dataset.view);
          return;
        }

        const gotoCard = event.target.closest("[data-goto-view]");
        if (gotoCard?.dataset.gotoView) {
          state.view = gotoCard.dataset.gotoView;
          state.tab = gotoCard.dataset.gotoTab;
          state.query = "";
          state.mobileMenuOpen = false;
          render();
          return;

      });

    function bindEvents() {
      document.getElementById("themeToggle")?.addEventListener("click", () => {
        state.theme = state.theme === "dark" ? "light" : "dark";
        localStorage.setItem("instagram-watcher:theme", state.theme);
        render();
      });
      document.getElementById("themeToggleMobile")?.addEventListener("click", () => {
        state.theme = state.theme === "dark" ? "light" : "dark";
        localStorage.setItem("instagram-watcher:theme", state.theme);

      document.getElementById("menuToggle")?.addEventListener("click", () => {
        state.mobileMenuOpen = !state.mobileMenuOpen;
        render();

      document.getElementById("searchInput")?.addEventListener("input", event => {
        state.query = event.target.value;
        render();
      });
      document.querySelectorAll(".tab-btn").forEach(btn => {
        btn.addEventListener("click", () => {
          state.tab = btn.dataset.tab;
          state.query = "";

      document.querySelectorAll(".copy-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          await copyText(btn.dataset.copy);
          state.copied = btn.dataset.copy;
          render();
          setTimeout(() => { state.copied = ""; render(); }, 1200);
        });
      });
      document.getElementById("fileInput")?.addEventListener("change", event => handleFiles(event.target.files));
      const dropZone = document.getElementById("dropZone");
      if (dropZone) {
        ["dragenter", "dragover"].forEach(name => dropZone.addEventListener(name, event => {
          event.preventDefault();
          dropZone.classList.add("drag-active");
        }));
        ["dragleave", "drop"].forEach(name => dropZone.addEventListener(name, event => {
          event.preventDefault();
          dropZone.classList.remove("drag-active");
        }));
        dropZone.addEventListener("drop", event => handleFiles(event.dataTransfer.files));
      }
      document.getElementById("saveWatcher")?.addEventListener("click", () => saveWatcherSettings());
      document.getElementById("startWatcher")?.addEventListener("click", () => startWatcherMonitoring());
      document.getElementById("stopWatcher")?.addEventListener("click", () => stopWatcherMonitoring());

      document.getElementById("exportData")?.addEventListener("click", exportData);
      document.getElementById("restoreDataInput")?.addEventListener("change", event => restoreData(event.target.files?.[0]));
      document.getElementById("clearData")?.addEventListener("click", () => {
        if (!confirm("Clear all local snapshots?")) return;
        state.snapshots = [makeSnapshot("Demo snapshot", demoFollowers, demoFollowing, new Date(Date.now() - 86400000 * 2))];
        saveSnapshots();
        render();
      });

    async function handleFiles(fileList) {
      const files = [...fileList];
      if (!files.length) return;
      state.uploadStatus = "loading";
      render();
      try {
        const parsed = await Promise.all(files.map(parseFile));
        const followers = [];
        const following = [];
        parsed.forEach(item => {
          const fileName = item.name.toLowerCase();
          const names = item.names;
          if (fileName.includes("following") || item.kind === "following") following.push(...names);
          else if (fileName.includes("followers") || item.kind === "followers") followers.push(...names);
        });
        if (!followers.length || !following.length) throw new Error("Missing followers or following");
        const snapshot = makeSnapshot(`Import ${new Date().toLocaleDateString()}`, followers, following);
        if (state.serverMode) {
          await API.send("POST", "/api/snapshots/import", {
            followers: snapshot.followers,
            following: snapshot.following,
            label: snapshot.label
          });
          await refreshFromServer();
        } else {
          state.snapshots.push(snapshot);
          saveSnapshots();
        }
        state.uploadStatus = "success";
      } catch (error) {
        console.error(error);
        state.uploadStatus = "error";
      }
      render();
      setTimeout(() => { state.uploadStatus = "idle"; render(); }, 1800);
    }

    async function parseFile(file) {
      const text = await file.text();
      const lower = file.name.toLowerCase();
      if (lower.endsWith(".html") || lower.endsWith(".htm")) {
        return { name: file.name, kind: lower.includes("following") ? "following" : "followers", names: parseHtml(text) };
      }
      const json = JSON.parse(text);
      return { name: file.name, kind: inferKind(json, lower), names: parseJson(json) };
    }

    function parseJson(value) {
      const names = [];
      const walk = input => {
        if (!input) return;
        if (Array.isArray(input)) return input.forEach(walk);
        if (typeof input === "object") {
          if (typeof input.value === "string") names.push(input.value);
          if (typeof input.href === "string" && input.href.includes("instagram.com")) names.push(input.href);
          Object.values(input).forEach(walk);
        }
      };
      walk(value);
      return uniqueUsernames(names);
    }

    function inferKind(json, fileName) {
      if (fileName.includes("following")) return "following";
      if (fileName.includes("followers")) return "followers";
      if (json.relationships_following) return "following";
      return "followers";
    }

    function parseHtml(text) {
      const doc = new DOMParser().parseFromString(text, "text/html");
      const links = [...doc.querySelectorAll("a[href*='instagram.com']")].map(a => a.href || a.textContent);
      const textNames = (doc.body.textContent || "").match(/@[a-zA-Z0-9._]+/g) || [];
      return uniqueUsernames([...links, ...textNames]);
    }

    function intervalToMs(interval = state.watcher.interval) {
      return Math.max(SYNC_INTERVALS[interval] || SYNC_INTERVALS["5m"], RATE_LIMIT.minGapMs);
    }

    function applyJitter(baseMs) {
      return baseMs + Math.floor(Math.random() * RATE_LIMIT.jitterMaxMs);
    }

    function getRateLimitUntil() {
      return state.watcher.rateLimitUntil ? new Date(state.watcher.rateLimitUntil).getTime() : 0;
    }

    function getNextAllowedSyncTime() {
      if (!state.watcher.lastSync) return 0;
      return new Date(state.watcher.lastSync).getTime() + intervalToMs();
    }

    function syncBlockedUntil() {
      return Math.max(getNextAllowedSyncTime(), getRateLimitUntil());
    }

    function cooldownRemainingMs() {
      return Math.max(0, syncBlockedUntil() - Date.now());
    }

    function canSyncNow() {
      if (state.syncInProgress) return false;
      const rateLimitUntil = state.watcher.rateLimitUntil ? new Date(state.watcher.rateLimitUntil).getTime() : 0;
      if (rateLimitUntil > Date.now()) return false;
      return true;
    }

    function syncButtonLabel() {
      if (state.syncInProgress) return "Syncing...";
      const rateLimitUntil = state.watcher.rateLimitUntil ? new Date(state.watcher.rateLimitUntil).getTime() : 0;
      if (rateLimitUntil > Date.now()) {
        const mins = Math.ceil((rateLimitUntil - Date.now()) / 60000);
        return `Backoff ${mins}m`;
      }
      const remaining = cooldownRemainingMs();
      if (remaining > 0) return "Force Sync Now";
      return "Sync now";
    }

    function syncButtonDisabled() {
      if (state.syncInProgress) return true;
      const rateLimitUntil = state.watcher.rateLimitUntil ? new Date(state.watcher.rateLimitUntil).getTime() : 0;
      return rateLimitUntil > Date.now();
    }

    function cooldownBadgeText() {
      const remaining = cooldownRemainingMs();
      if (state.syncInProgress) return "Status: syncing safely";
      if (remaining > 0) return `Cooldown: ${formatDuration(remaining)} remaining`;
      if (state.watcher.running) return state.serverMode ? "Status: running 24/7 on server" : "Status: running locally";
      if (state.watcher.connected) return "Status: paused — tap Start to resume";
      return "Status: ready";
    }

    function formatDuration(ms) {
      const totalSeconds = Math.ceil(ms / 1000);
      const minutes = Math.floor(totalSeconds / 60);
      const seconds = totalSeconds % 60;
      return `${minutes}:${String(seconds).padStart(2, "0")}`;
    }

    function refreshWatcherHealth() {
      if (state.syncInProgress) {
        state.watcher.health = "Sync in progress";
        return;
      }
      const rateLimitUntil = getRateLimitUntil();
      if (rateLimitUntil > Date.now()) {
        state.watcher.health = `Backoff until ${formatDate(rateLimitUntil)}`;
        return;
      }
      const remaining = cooldownRemainingMs();
      if (state.watcher.connected && remaining > 0) {
        state.watcher.health = `Cooldown ${formatDuration(remaining)}`;
        return;
      }
      state.watcher.health = state.watcher.running ? "Running 24/7" : state.watcher.connected ? "Paused" : "Ready";
    }

    async function saveWatcherSettings() {
      const adminUsername = document.getElementById("watcherAdminUsername").value.trim();
      const adminSessionId = document.getElementById("watcherAdminSessionId").value.trim();
      const targetUsername = normalizeUsername(document.getElementById("watcherTargetUsername").value);
      const targetUserId = document.getElementById("watcherTargetUserId")?.value.trim() || "";
      const interval = document.getElementById("syncInterval").value;
      if (!targetUsername) return;
      state.watcher.adminUsername = adminUsername;
      state.watcher.adminSessionId = adminSessionId;
      state.watcher.targetUsername = targetUsername;
      state.watcher.username = targetUsername;
      state.watcher.targetUserId = targetUserId;
      state.watcher.interval = interval;
      state.watcher.connected = true;
      if (state.serverMode) {
        state.watcher = normalizeSettings(await API.send("PUT", "/api/watcher", { adminUsername, adminSessionId, targetUsername, targetUserId, interval }));
        await refreshFromServer();
      } else {
        saveSettings();
        refreshWatcherHealth();
      }
      render();
    }

    async function startWatcherMonitoring() {
      const targetUsername = normalizeUsername(document.getElementById("watcherTargetUsername")?.value || state.watcher.targetUsername || state.watcher.username);
      if (!targetUsername) return;
      if (state.serverMode) {
        try {
          await saveWatcherToServer();
          state.watcher = normalizeSettings(await API.send("POST", "/api/watcher/start"));
          await refreshFromServer();
        } catch (error) {
          alert(error.message || "Could not start watcher");
          await refreshFromServer().catch(() => {});
        }
      } else {
        state.watcher.targetUsername = targetUsername;
        state.watcher.username = targetUsername;
        state.watcher.running = true;
        state.watcher.connected = true;
        saveSettings();
        refreshWatcherHealth();
        startWatcherScheduler();
        runWatcherSync({ automatic: false });
      }
      render();
    }

    async function stopWatcherMonitoring() {
      if (state.serverMode) {
        state.watcher = normalizeSettings(await API.send("POST", "/api/watcher/stop"));
        await refreshFromServer();
      } else {
        state.watcher.running = false;
        stopWatcherScheduler();
        saveSettings();
        refreshWatcherHealth();
      }
      render();
    }

    async function saveWatcherToServer() {
      const adminUsername = document.getElementById("watcherAdminUsername")?.value.trim() ?? state.watcher.adminUsername;
      const adminSessionId = document.getElementById("watcherAdminSessionId")?.value.trim() ?? state.watcher.adminSessionId;
      const targetUsername = normalizeUsername(document.getElementById("watcherTargetUsername")?.value ?? state.watcher.targetUsername ?? state.watcher.username);
      const targetUserId = document.getElementById("watcherTargetUserId")?.value.trim() ?? state.watcher.targetUserId;
      const interval = document.getElementById("syncInterval")?.value || state.watcher.interval;
      state.watcher = normalizeSettings(await API.send("PUT", "/api/watcher", { adminUsername, adminSessionId, targetUsername, targetUserId, interval }));
    }

    async function clearLogs() {
      if (!confirm("Clear all logs?")) return;
      if (state.serverMode) {
        await API.send("DELETE", "/api/logs");
        await refreshFromServer();
      } else {
        state.logs = [];
      }
      render();
    }

    function registerRateLimitHit() {
      const step = Math.min(state.watcher.consecutiveErrors, RATE_LIMIT.backoffMinutes.length - 1);
      const backoffMs = RATE_LIMIT.backoffMinutes[step] * 60 * 1000;
      state.watcher.consecutiveErrors += 1;
      state.watcher.rateLimitUntil = new Date(Date.now() + backoffMs).toISOString();
      refreshWatcherHealth();
      saveSettings();
      scheduleNextSync();
    }

    function clearRateLimitState() {
      state.watcher.consecutiveErrors = 0;
      state.watcher.rateLimitUntil = null;
    }

    function handleWatcherAction() {
      const targetUsername = normalizeUsername(document.getElementById("watcherTargetUsername").value);
      if (!targetUsername) return;
      state.watcher.adminUsername = document.getElementById("watcherAdminUsername").value.trim();
      state.watcher.adminSessionId = document.getElementById("watcherAdminSessionId").value.trim();
      state.watcher.targetUsername = targetUsername;
      state.watcher.username = targetUsername;
      state.watcher.interval = document.getElementById("syncInterval").value;
      if (state.serverMode) {
        manualServerSync();
        return;
      }
      if (!state.watcher.connected) {
        state.watcher.connected = true;
        saveSettings();
        runWatcherSync({ automatic: false });
        return;
      }
      if (!canSyncNow()) return;
      runWatcherSync({ automatic: false });
    }

    async function manualServerSync() {
      if (state.syncInProgress) return;
      // Respect server-side Instagram backoff — retrying extends the ban.
      const rateLimitUntil = state.watcher.rateLimitUntil ? new Date(state.watcher.rateLimitUntil).getTime() : 0;
      if (rateLimitUntil > Date.now()) {
        const mins = Math.ceil((rateLimitUntil - Date.now()) / 60000);
        alert(`Instagram backoff is active. Wait ~${mins} more minute(s) before syncing again.\n\nOpen Instagram as the admin account and resolve any checkpoint if shown.`);
        return;
      }
      state.syncInProgress = true;
      render();
      try {
        // Do not save settings before sync — that used to clear rate-limit backoff.
        const result = await API.send("POST", "/api/watcher/sync");
        state.watcher = normalizeSettings(result.watcher);
        await refreshFromServer();
        if (result.skipped) {
          if (result.reason === "rate_limited") {
            alert(result.detail || "Sync blocked by Instagram backoff. Wait before trying again.");
          }
          state.uploadStatus = "idle";
        } else if (!result.ok && result.reason) {
          // Sync ran and failed — watcher state already has lastError from server.
        } else {
          state.tab = "all";
        }
      } catch (error) {
        console.error(error);
      } finally {
        state.syncInProgress = false;
        render();
      }
    }

    async function runWatcherSync({ automatic = false } = {}) {
      if (state.syncInProgress) return;
      if (state.watcher.connected && cooldownRemainingMs() > 0) return;

      const targetUsername = normalizeUsername(state.watcher.targetUsername || state.watcher.username || document.getElementById("watcherTargetUsername")?.value);
      if (!targetUsername) return;

      state.syncInProgress = true;
      refreshWatcherHealth();
      render();

      const pacingDelay = automatic ? applyJitter(0) : 0;
      if (pacingDelay) await new Promise(resolve => setTimeout(resolve, pacingDelay));

      try {
        const latest = latestSnapshot();
        const followerPool = uniqueUsernames([...latest.followers, targetUsername + ".friend", "fresh.creator", "local.watch"]);
        const followingPool = uniqueUsernames([...latest.following, "brand.archive", "visual.notes"]);
        const maybeDrop = followerPool.filter((_, index) => index !== 1 || Math.random() > .5);

        state.watcher.targetUsername = targetUsername;
        state.watcher.username = targetUsername;
        state.watcher.connected = true;
        state.watcher.lastSync = new Date().toISOString();
        clearRateLimitState();
        refreshWatcherHealth();

        state.snapshots.push(makeSnapshot(`Watcher sync @${targetUsername}`, maybeDrop, followingPool));
        saveSettings();
        saveSnapshots();
        if (!automatic) state.tab = "all";
      } catch (error) {
        console.error(error);
        registerRateLimitHit();
      } finally {
        state.syncInProgress = false;
        refreshWatcherHealth();
        saveSettings();
        scheduleNextSync();
        render();
        updateCooldownBadges();
      }
    }

    function scheduleNextSync() {
      if (state.serverMode) return;
      if (syncTimer) {
        clearTimeout(syncTimer);
        syncTimer = null;
      }
      if (!state.watcher.connected && !state.watcher.running) return;

      const waitMs = cooldownRemainingMs();
      const delay = waitMs > 0 ? applyJitter(waitMs) : applyJitter(1000);
      syncTimer = setTimeout(async () => {
        if (!state.watcher.running || state.syncInProgress) {
          scheduleNextSync();
          return;
        }
        if (cooldownRemainingMs() > 0) {
          scheduleNextSync();
          return;
        }
        await runWatcherSync({ automatic: true });
      }, delay);
    }

    function startWatcherScheduler() {
      scheduleNextSync();
    }

    function stopWatcherScheduler() {
      if (syncTimer) {
        clearTimeout(syncTimer);
        syncTimer = null;
      }
    }

    function startCooldownTicker() {
      if (cooldownTicker) clearInterval(cooldownTicker);
      cooldownTicker = setInterval(() => {
        refreshWatcherHealth();
        updateCooldownBadges();
        const button = document.getElementById("connectWatcher");
        if (button) {
          button.disabled = syncButtonDisabled();
          button.textContent = syncButtonLabel();
        }
        // Do NOT auto-trigger syncs from the browser in serverMode.
        // The server scheduler owns that. An open dashboard tab was previously
        // calling manualServerSync() every second when cooldown hit 0, which
        // hammered Instagram and caused feedback_required / is_spam flags.
      }, 1000);
    }

    function updateCooldownBadges() {
      const nextBadge = document.getElementById("nextSyncBadge");
      const cooldownBadge = document.getElementById("cooldownBadge");
      const healthBadge = document.querySelector("[data-watcher-health]");
      if (nextBadge) nextBadge.textContent = `Next safe check: ${nextSyncText()}`;
      if (cooldownBadge) cooldownBadge.textContent = cooldownBadgeText();
      if (healthBadge) healthBadge.textContent = state.watcher.health;
    }

    function exportData() {
      const payload = {
        exportedAt: new Date().toISOString(),
        app: "Instagram Watcher",
        version: 1,
        watcher: state.watcher,
        snapshots: state.snapshots
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `instagram-watcher-data-${new Date().toISOString().slice(0, 10)}.json`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      URL.revokeObjectURL(url);
    }

    async function restoreData(file) {
      if (!file) return;
      try {
        const payload = JSON.parse(await file.text());
        if (!Array.isArray(payload.snapshots) || !payload.snapshots.length) throw new Error("Backup has no snapshots");
        state.snapshots = payload.snapshots
          .filter(snapshot => Array.isArray(snapshot.followers) && Array.isArray(snapshot.following))
          .map(snapshot => ({
            id: snapshot.id || (window.crypto && crypto.randomUUID ? crypto.randomUUID() : String(Date.now())),
            label: snapshot.label || "Restored snapshot",
            date: snapshot.date || new Date().toISOString(),
            followers: uniqueUsernames(snapshot.followers),
            following: uniqueUsernames(snapshot.following)
          }));
        if (!state.snapshots.length) throw new Error("Backup has no usable snapshots");
        if (payload.watcher) state.watcher = normalizeSettings({ ...loadSettings(), ...payload.watcher });
        await persistAll();
        state.storageReady = true;
        state.storageStatus = "Restored to IndexedDB";
        state.uploadStatus = "success";
      } catch (error) {
        console.error(error);
        state.uploadStatus = "error";
      }
      render();
      setTimeout(() => { state.uploadStatus = "idle"; render(); }, 1800);
    }

    async function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        try {
          await navigator.clipboard.writeText(text);
          return;
        } catch (error) {
          console.warn("Clipboard API unavailable, using fallback copy.", error);
        }
      }
      const area = document.createElement("textarea");
      area.value = text;
      area.setAttribute("readonly", "");
      area.style.position = "fixed";
      area.style.opacity = "0";
      document.body.appendChild(area);
      area.select();
      document.execCommand("copy");
      area.remove();
    }

    function formatDate(value) {
      return new Intl.DateTimeFormat("en", { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" }).format(new Date(value));
    }

    function nextSyncText() {
      if (!state.watcher.connected) return "after connect";
      if (!state.watcher.lastSync) return "on first connect";
      const blockedUntil = syncBlockedUntil();
      if (blockedUntil <= Date.now()) return "ready now";
      return formatDate(blockedUntil);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#039;" }[char]));
    }

    render();
    bindPersistentEvents();
    initStorage();
  </script>
</body>
</html>
